name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # Production: arkserver — full MCP stack
  # ─────────────────────────────────────────
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_PATH="/var/www/mcp.arkturian.com"
            REPO_URL="https://github.com/Arkturian/mcp-server.git"
            SERVICE_NAME="mcp-server"

            # Init git repo if needed (migrating from scp-based deploy)
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Initializing git repo in deploy path..."
              cd "$DEPLOY_PATH"
              git init
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            fi

            cd "$DEPLOY_PATH"

            # Pull latest code from main
            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Install/update Python dependencies
            echo "Installing dependencies..."
            if [ -f "venv/bin/activate" ]; then
              source venv/bin/activate
            elif [ -f ".venv/bin/activate" ]; then
              source .venv/bin/activate
            else
              echo "No virtualenv found, creating one..."
              python3 -m venv venv
              source venv/bin/activate
            fi
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            # Restart service
            echo "Restarting $SERVICE_NAME service..."
            sudo systemctl restart $SERVICE_NAME

            # Wait for service to start
            sleep 3

            # Health check
            echo "Running health check..."
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Health check passed!"
            else
              echo "Health check failed, checking service status..."
              sudo systemctl status $SERVICE_NAME --no-pager -l
              exit 1
            fi

            echo "Deployment completed!"

      - name: Notify on success
        if: success()
        run: echo "Deployment successful for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed for commit ${{ github.sha }}"

  # ─────────────────────────────────────────
  # Production: pdrei (jascha) — content only
  # ─────────────────────────────────────────
  deploy-pdrei:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to pdrei
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PDREI_DEPLOY_HOST }}
          username: ${{ secrets.PDREI_DEPLOY_USER }}
          key: ${{ secrets.PDREI_DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_PATH="/var/www/mcp-server"
            REPO_URL="https://github.com/Arkturian/mcp-server.git"
            SERVICE_NAME="mcp-server"
            DOMAIN="mcp.pdrei.arkturian.com"
            UPSTREAM_PORT=8080

            # Init git repo if needed
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Initializing git repo in deploy path..."
              cd "$DEPLOY_PATH"
              git init
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            fi

            cd "$DEPLOY_PATH"

            # Pull latest code from main
            echo "Fetching latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Setup venv
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            # Always (re)write systemd unit so changes propagate
            echo "Writing systemd unit..."
            sudo tee /etc/systemd/system/${SERVICE_NAME}.service > /dev/null <<UNIT
            [Unit]
            Description=MCP Server (content only)
            After=network.target

            [Service]
            Type=simple
            User=jascha
            WorkingDirectory=${DEPLOY_PATH}
            Environment="MCP_SERVERS=content"
            Environment="MCP_HOST=127.0.0.1"
            Environment="MCP_PORT=${UPSTREAM_PORT}"
            Environment="CONTENT_API_BASE=http://127.0.0.1:8015"
            ExecStart=${DEPLOY_PATH}/venv/bin/python ${DEPLOY_PATH}/server.py
            Restart=on-failure
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            UNIT
            sudo systemctl daemon-reload
            sudo systemctl enable ${SERVICE_NAME}

            # Always (re)write nginx vhost — Host header workaround for FastMCP
            # FastMCP enables DNS rebinding protection on localhost; nginx must
            # forward Host=localhost:PORT and strip Origin so the proxy passes through
            # SSL cert is shared with content.pdrei + pdrei (issued via certbot multi-domain)
            echo "Writing nginx vhost with SSL..."
            CERT_PATH="/etc/letsencrypt/live/mcp.pdrei.arkturian.com"
            if [ ! -d "$CERT_PATH" ]; then
              echo "ERROR: SSL cert not found at $CERT_PATH"
              echo "Run: sudo certbot --nginx -d mcp.pdrei.arkturian.com -d content.pdrei.arkturian.com -d pdrei.arkturian.com"
              exit 1
            fi

            sudo tee /etc/nginx/sites-available/${DOMAIN} > /dev/null <<NGINX
            server {
                listen 80;
                server_name ${DOMAIN};
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name ${DOMAIN};

                ssl_certificate ${CERT_PATH}/fullchain.pem;
                ssl_certificate_key ${CERT_PATH}/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

                location / {
                    proxy_pass http://127.0.0.1:${UPSTREAM_PORT};
                    proxy_http_version 1.1;
                    # FastMCP DNS rebinding protection: only allows localhost:* host
                    proxy_set_header Host localhost:${UPSTREAM_PORT};
                    proxy_set_header Origin "";
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                    proxy_buffering off;
                }
            }
            NGINX
            sudo ln -sf /etc/nginx/sites-available/${DOMAIN} /etc/nginx/sites-enabled/${DOMAIN}

            sudo nginx -t && sudo systemctl reload nginx

            echo "Restarting $SERVICE_NAME..."
            sudo systemctl restart ${SERVICE_NAME}
            sleep 5

            # Health check
            if curl -sf http://localhost:${UPSTREAM_PORT}/ > /dev/null; then
              echo "✅ Local health check passed!"
              echo "Mounted endpoints:"
              sudo journalctl -u ${SERVICE_NAME} -n 30 --no-pager | grep -E "(✓ Mounted|⊘ Skipping)" || true
            else
              echo "⚠️ Health check failed"
              sudo systemctl status ${SERVICE_NAME} --no-pager
              sudo journalctl -u ${SERVICE_NAME} -n 50 --no-pager
              exit 1
            fi

            # Verify HTTPS endpoint
            if curl -sf https://${DOMAIN}/ > /dev/null; then
              echo "✅ HTTPS endpoint reachable"
            else
              echo "⚠️ HTTPS endpoint check failed (DNS / cert?)"
            fi
